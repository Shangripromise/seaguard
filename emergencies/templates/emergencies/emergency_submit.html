{% extends "base.html" %}
{% block title %}SeaGuard - Request Recovery{% endblock %}
{% block content %}
    <div class="card">
        <h2>New Recovery Request</h2>
        <p>Submit an emergency recovery request for your vessel.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger">Submit Emergency Request</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
