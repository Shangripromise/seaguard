{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SeaGuard - Request Recovery</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <h1>SEAGUARD</h1>
        <div>
            <span style="color:#ccc; font-size:14px;">{{ request.user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>New Recovery Request</h2>
            <p>Submit an emergency recovery request for your vessel.</p>
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-danger">Submit Emergency Request</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
