{% extends "base.html" %}
{% block title %}SeaGuard - Login{% endblock %}
{% block content %}
    <div class="card">
        <h2>Sign In</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p style="margin-top:15px;">No account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
{% endblock %}
