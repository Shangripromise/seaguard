{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SeaGuard - Register</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <h1>SEAGUARD</h1>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Create Account</h2>
            <p>Join SeaGuard to access emergency recovery services</p>
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <p style="margin-top:15px;">Already registered? <a href="{% url 'login' %}">Sign In</a></p>
        </div>
    </div>
</body>
</html>
