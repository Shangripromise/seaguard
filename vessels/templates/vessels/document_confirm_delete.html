{% extends "base.html" %}
{% block title %}Delete Document{% endblock %}
{% block content %}
<div class="card">
    <h2>Delete Document</h2>
    <p>Are you sure you want to delete <strong>{{ doc.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'vessels:vessel_detail' doc.vessel.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
