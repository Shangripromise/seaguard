{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SeaGuard - Delete Vessel</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <h1>SeaGuard</h1>
        <div>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Delete {{ vessel.name }}?</h2>
            <p>Are you sure you want to delete this vessel? This cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'vessel_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
