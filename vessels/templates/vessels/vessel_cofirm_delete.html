<!DOCTYPE html>
<html>
<head><title>SeaGuard - Delete Vessel</title></head>
<body>
    <h1>Delete {{ vessel.name }}?</h1>
    <p>Are you sure you want to delete this vessel? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    <a href="{% url 'vessel_list' %}">Cancel</a>
</body>
</html>
