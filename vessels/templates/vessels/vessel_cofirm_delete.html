{% extends "base.html" %}
{% block title %}SeaGuard - {{ vessel.name }}{% endblock %}
{% block content %}
    <div class="card">
        <h2>{{ vessel.name }}</h2>
        <p><strong>Type:</strong> {{ vessel.vessel_type }}</p>
        <p><strong>Registration:</strong> {{ vessel.registration_number }}</p>
        <p><strong>Description:</strong> {{ vessel.description }}</p>
        <a href="{% url 'vessels:vessel_delete' vessel.pk %}" class="btn btn-danger">Delete Vessel</a>
        <a href="{% url 'vessels:vessel_list' %}" class="btn btn-secondary">← My Vessels</a>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">← Dashboard</a>
    </div>
{% endblock %}
