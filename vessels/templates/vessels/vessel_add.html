{% extends "base.html" %}
{% block title %}SeaGuard - Add Vessel{% endblock %}
{% block content %}
    <div class="card">
        <h2>Add Vessel</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Add Vessel</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
