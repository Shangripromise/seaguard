{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SeaGuard - Vessel Detail</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <h1>SEAGUARD</h1>
        <div>
            <span style="color:#ccc; font-size:14px;">{{ request.user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>{{ vessel.name }}</h2>
            <p><strong>Type:</strong> {{ vessel.vessel_type }}</p>
            <p><strong>Registration:</strong> {{ vessel.registration_number }}</p>
            <p><strong>Description:</strong> {{ vessel.description }}</p>
            <a href="{% url 'vessels:vessel_delete' vessel.pk %}" class="btn btn-danger">Delete Vessel</a>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
